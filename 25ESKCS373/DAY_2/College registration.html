<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKIT Student Registration Form</title>

<style>
/* Reset and Google Fonts Integration */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px 0;
}

/* Heading */
h1{
    text-align: center;
    color: #ffffff;
    margin-bottom: 10px;
    font-size: 40px;
    font-weight: 700;
    text-shadow: 0px 4px 10px rgba(0,0,0,0.3);
    letter-spacing: 1px;
}

h1 span {
    color: #4ca1af;
}

/* Registration Box */
.container{
    width: 520px;
    background: #ffffff;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0px 15px 35px rgba(0,0,0,0.4);
    transition: transform 0.3s ease;
}

/* Form Heading */
.container h2{
    text-align: center;
    color: #1a365d;
    margin-bottom: 30px;
    font-size: 24px;
    font-weight: 600;
    position: relative;
}

/* Subtle accent line under the form title */
.container h2::after {
    content: '';
    display: block;
    width: 60px;
    height: 4px;
    background: #4ca1af;
    margin: 8px auto 0 auto;
    border-radius: 2px;
}

label{
    display: block;
    margin-top: 20px;
    font-weight: 600;
    color: #2d3748;
    font-size: 14px;
}

input,
select,
textarea{
    width: 100%;
    padding: 12px 15px;
    margin-top: 6px;
    border: 1px solid #cbd5e0;
    border-radius: 8px;
    background-color: #f7fafc;
    color: #2d3748;
    font-size: 14px;
    transition: all 0.3s ease;
}

input:focus,
select:focus,
textarea:focus{
    border-color: #4ca1af;
    background-color: #fff;
    box-shadow: 0 0 0 3px rgba(76, 161, 175, 0.2);
    outline: none;
}

/* Styled Radio Group */
.gender-group {
    display: flex;
    gap: 20px;
    margin-top: 10px;
}

.gender-label {
    display: flex;
    align-items: center;
    cursor: pointer;
    font-weight: 400;
    font-size: 15px;
    color: #4a5568;
}

.gender-label input {
    width: auto;
    margin-top: 0;
    margin-right: 8px;
    accent-color: #4ca1af;
    transform: scale(1.1);
}

textarea {
    resize: none;
}

/* Animated Button */
button{
    width: 100%;
    padding: 14px;
    margin-top: 35px;
    background: linear-gradient(135deg, #2c5364, #203a43);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    transition: all 0.3s ease;
}

button:hover{
    background: linear-gradient(135deg, #4ca1af, #2c5364);
    box-shadow: 0 6px 15px rgba(76, 161, 175, 0.4);
    transform: translateY(-2px);
}

button:active {
    transform: translateY(0);
}

footer{
    text-align: center;
    margin-top: 25px;
    color: #a0aec0;
    font-size: 13px;
    letter-spacing: 0.5px;
}
</style>

</head>

<body>

<h1><span>SKIT</span> Admission Portal</h1>

<div class="container">

<h2>Student Registration</h2>

<form>

<label>Full Name</label>
<input type="text" placeholder="Enter your full name" required>

<label>Email Address</label>
<input type="email" placeholder="example@skit.ac.in" required>

<label>Phone Number</label>
<input type="tel" placeholder="Enter 10-digit mobile number" required>

<label>Date of Birth</label>
<input type="date" required>

<label>Preferred Course</label>
<select required>
<option value="" disabled selected>Select your course</option>
<option>B.Tech (Computer Science)</option>
<option>B.Tech (Information Technology)</option>
<option>B.Tech (Electronics & Communication)</option>
<option>M.Tech</option>
<option>MBA</option>
</select>

<label>Gender</label>
<div class="gender-group">
    <label class="gender-label"><input type="radio" name="gender" value="male" required> Male</label>
    <label class="gender-label"><input type="radio" name="gender" value="female"> Female</label>
    <label class="gender-label"><input type="radio" name="gender" value="other"> Other</label>
</div>

<label>Permanent Address</label>
<textarea rows="3" placeholder="Enter your full address correspondence..." required></textarea>

<label>Create Password</label>
<input type="password" placeholder="Min. 8 characters" required>

<label>Confirm Password</label>
<input type="password" placeholder="Retype password" required>

<button type="submit">Submit Registration</button>

</form>

</div>

<footer>
© 2026 SKIT | Swami Keshvanand Institute of Technology | All Rights Reserved
</footer>

</body>
